<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        background: #202020;
        color: #fffdf9;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        height: 100%;
        margin: 0;
        overflow: hidden;
        width: 100%;
      }

      body {
        align-items: center;
        display: flex;
        justify-content: center;
      }

      .splash {
        align-items: center;
        background:
          linear-gradient(135deg, rgba(200, 149, 59, 0.18), transparent 36%),
          radial-gradient(circle at 68% 24%, rgba(255, 253, 249, 0.08), transparent 28%),
          #171412;
        display: flex;
        flex-direction: column;
        gap: 32px;
        height: 100vh;
        justify-content: center;
        padding: 8vmin;
        width: 100vw;
      }

      .splash img {
        height: min(36vmin, 360px);
        width: auto;
      }

      .splash h1,
      .screenshot h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(34px, 7vmin, 84px);
        line-height: 0.92;
        margin: 0;
        text-align: center;
      }

      .splash p,
      .screenshot p {
        color: rgba(255, 253, 249, 0.72);
        font-size: clamp(15px, 2.4vmin, 24px);
        font-weight: 700;
        margin: 0;
        text-align: center;
      }

      .screenshot {
        background: #202020;
        display: grid;
        gap: 0;
        height: 100vh;
        max-width: 100vw;
        overflow: hidden;
        width: 100vw;
      }

      .phone {
        grid-template-rows: auto 1fr auto;
      }

      .desktop {
        grid-template-columns: 280px 1fr;
      }

      .topbar,
      .sidebar,
      .bottomnav {
        background: #171412;
        border-color: rgba(255, 253, 249, 0.12);
      }

      .topbar {
        align-items: center;
        border-bottom: 1px solid rgba(255, 253, 249, 0.12);
        display: flex;
        gap: 14px;
        padding: 18px;
      }

      .topbar img,
      .sidebar img {
        height: 54px;
        width: auto;
      }

      .brand {
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }

      .brand h1 {
        font-size: 30px;
        overflow: hidden;
        text-align: left;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .brand p {
        font-size: 13px;
        overflow: hidden;
        text-align: left;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .phone .topbar img {
        height: 44px;
      }

      .phone .brand h1 {
        font-size: 26px;
      }

      .phone .brand p {
        font-size: 11px;
      }

      .feed {
        background: #f2f1ee;
        color: #171412;
        display: grid;
        gap: 16px;
        overflow: hidden;
        padding: 18px;
      }

      .phone .feed {
        grid-template-rows: auto 1fr;
        min-width: 0;
        padding: 18px;
      }

      .desktop .feed {
        grid-template-columns: minmax(360px, 1fr) minmax(300px, 0.7fr);
        grid-template-rows: auto 1fr;
        padding: 28px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        overflow: hidden;
      }

      .phone .tabs {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        width: 100%;
      }

      .desktop .tabs {
        grid-column: 1 / -1;
      }

      .desktop .panel {
        grid-column: 1;
      }

      .desktop .cards {
        grid-column: 2;
      }

      .tab {
        border: 1px solid #cfc8bd;
        border-radius: 8px;
        flex: 0 0 auto;
        font-size: 16px;
        font-weight: 900;
        padding: 10px 16px;
        text-align: center;
      }

      .phone .tab {
        font-size: 14px;
        padding: 10px 8px;
      }

      .tab.active {
        background: #171412;
        color: #fffdf9;
      }

      .panel {
        background: #fffdf9;
        border: 1px solid #cfc8bd;
        border-radius: 8px;
        min-width: 0;
        overflow: hidden;
      }

      .media {
        align-items: center;
        background:
          linear-gradient(140deg, #171412 0%, #322d28 42%, #c8953b 100%);
        color: #fffdf9;
        display: flex;
        min-height: 340px;
        justify-content: center;
        padding: 32px;
      }

      .desktop .media {
        min-height: 430px;
      }

      .media img {
        height: 210px;
        opacity: 0.96;
        width: auto;
      }

      .caption {
        padding: 16px;
      }

      .caption strong {
        display: block;
        font-size: 20px;
        margin-bottom: 6px;
      }

      .caption span {
        color: #766d62;
        display: block;
        font-size: 14px;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .cards {
        display: grid;
        gap: 14px;
      }

      .card {
        background: #fffdf9;
        border: 1px solid #cfc8bd;
        border-radius: 8px;
        padding: 16px;
      }

      .card b {
        display: block;
        font-size: 18px;
        margin-bottom: 8px;
      }

      .card span {
        color: #766d62;
        display: block;
        font-size: 14px;
        line-height: 1.5;
      }

      .bottomnav {
        border-top: 1px solid rgba(255, 253, 249, 0.12);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        min-width: 0;
        padding: 12px 10px 18px;
      }

      .bottomnav span,
      .sidebar span {
        color: #fffdf9;
        font-size: 12px;
        font-weight: 900;
        text-align: center;
      }

      .sidebar {
        border-right: 1px solid rgba(255, 253, 249, 0.12);
        padding: 28px;
      }

      .sidebar .brand h1 {
        font-size: 36px;
        line-height: 0.92;
        text-overflow: clip;
        white-space: normal;
      }

      .sidebar nav {
        display: grid;
        gap: 12px;
        margin-top: 42px;
      }

      .sidebar span {
        border: 1px solid rgba(255, 253, 249, 0.16);
        border-radius: 8px;
        padding: 13px 16px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <main id="root"></main>
    <script>
      const hashMode = location.hash.replace(/^#/, "");
      const mode =
        new URLSearchParams(location.search).get("mode") || hashMode || "splash";
      const logo = "../src/app/icon.svg";
      const root = document.getElementById("root");

      if (mode === "splash") {
        root.className = "splash";
        root.innerHTML = `
          <img alt="" src="${logo}" />
          <h1>The<br />Tattoo Core</h1>
          <p>The heart of the tattoo community.</p>
        `;
      } else {
        const desktop = mode === "desktop";
        root.className = `screenshot ${desktop ? "desktop" : "phone"}`;
        root.innerHTML = desktop
          ? `
            <aside class="sidebar">
              <img alt="" src="${logo}" />
              <div class="brand">
                <h1>The Tattoo Core</h1>
                <p>The heart of the tattoo community.</p>
              </div>
              <nav>
                <span>4U</span><span>Gossip</span><span>Stuff</span><span>Gigs</span><span>DM</span>
              </nav>
            </aside>
            <section class="feed">
              ${feedMarkup()}
              ${sideCards()}
            </section>
          `
          : `
            <header class="topbar">
              <img alt="" src="${logo}" />
              <div class="brand">
                <h1>The Tattoo Core</h1>
                <p>The heart of the tattoo community.</p>
              </div>
            </header>
            <section class="feed">${feedMarkup()}</section>
            <nav class="bottomnav">
              <span>Search</span><span>Saved</span><span>Alerts</span><span>DM</span><span>Me</span>
            </nav>
          `;
      }

      function feedMarkup() {
        return `
          <div class="tabs">
            <div class="tab active">4U</div><div class="tab">Gossip</div><div class="tab">Stuff</div><div class="tab">Gigs</div>
          </div>
          <article class="panel">
            <div class="media"><img alt="" src="${logo}" /></div>
            <div class="caption">
              <strong>Artist-first social feed</strong>
              <span>Photos, short reels, shop talk, professional gigs, and verified Stuff access.</span>
            </div>
          </article>
        `;
      }

      function sideCards() {
        return `
          <div class="cards">
            <div class="card"><b>Verified pros</b><span>Artists, studios, and vendors can request approval before selling or trading.</span></div>
            <div class="card"><b>Community safety</b><span>18+ signup, reports, blocking, and moderation queues are part of the launch plan.</span></div>
            <div class="card"><b>No AI tattoo art</b><span>Built for real body-art culture and licensed professionals.</span></div>
          </div>
        `;
      }
    </script>
  </body>
</html>
