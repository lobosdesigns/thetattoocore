<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>TheTattooCore could not load</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: #171412;
        color: #f7f2e9;
        display: grid;
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        padding:
          calc(24px + env(safe-area-inset-top))
          calc(24px + env(safe-area-inset-right))
          calc(24px + env(safe-area-inset-bottom))
          calc(24px + env(safe-area-inset-left));
      }

      main {
        margin: 0 auto;
        max-width: 30rem;
        text-align: center;
        width: 100%;
      }

      .mark {
        color: #d9a83a;
        font-size: 0.875rem;
        font-weight: 900;
        letter-spacing: 0;
        margin: 0 0 16px;
        text-transform: uppercase;
      }

      h1 {
        font-size: 1.75rem;
        line-height: 1.2;
        margin: 0;
      }

      p {
        color: #cfc7bb;
        line-height: 1.5;
        margin: 12px 0 24px;
      }

      a {
        background: #d9a83a;
        border: 2px solid #d9a83a;
        color: #171412;
        display: inline-flex;
        font-weight: 900;
        justify-content: center;
        min-height: 48px;
        padding: 12px 20px;
        text-decoration: none;
        width: min(100%, 18rem);
      }

      a:focus-visible {
        outline: 3px solid #f7f2e9;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">TheTattooCore</div>
      <h1>The app couldn't load</h1>
      <p>Check your connection, then try again.</p>
      <a href="https://thetattoocore.com/login">Try again</a>
    </main>
  </body>
</html>
