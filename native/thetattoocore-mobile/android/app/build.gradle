apply plugin: 'com.android.application'

def ttcUploadStoreFile = project.findProperty("TTC_ANDROID_UPLOAD_STORE_FILE") ?: System.getenv("TTC_ANDROID_UPLOAD_STORE_FILE")
def ttcUploadStorePassword = project.findProperty("TTC_ANDROID_UPLOAD_STORE_PASSWORD") ?: System.getenv("TTC_ANDROID_UPLOAD_STORE_PASSWORD")
def ttcUploadKeyAlias = project.findProperty("TTC_ANDROID_UPLOAD_KEY_ALIAS") ?: System.getenv("TTC_ANDROID_UPLOAD_KEY_ALIAS")
def ttcUploadKeyPassword = project.findProperty("TTC_ANDROID_UPLOAD_KEY_PASSWORD") ?: System.getenv("TTC_ANDROID_UPLOAD_KEY_PASSWORD")
def hasTtcUploadSigning = [
    ttcUploadStoreFile,
    ttcUploadStorePassword,
    ttcUploadKeyAlias,
    ttcUploadKeyPassword,
].every { value -> value?.toString()?.trim() }
def ttcServicesFile = file('google-services.json')
def hasTtcServicesConfig = ttcServicesFile.isFile() && ttcServicesFile.length() > 0

android {
    namespace "com.thetattoocore.app"
    compileSdk rootProject.ext.compileSdkVersion

    signingConfigs {
        if (hasTtcUploadSigning) {
            release {
                storeFile file(ttcUploadStoreFile)
                storePassword ttcUploadStorePassword
                keyAlias ttcUploadKeyAlias
                keyPassword ttcUploadKeyPassword
            }
        }
    }

    defaultConfig {
        applicationId "com.thetattoocore.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "1.0.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        debug {
            applicationIdSuffix ".qa"
            versionNameSuffix "-qa"
            resValue "string", "app_name", "TheTattooCore QA"
            resValue "string", "title_activity_main", "TheTattooCore QA"
        }
        release {
            minifyEnabled false
            if (hasTtcUploadSigning) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

if (hasTtcServicesConfig) {
    apply plugin: 'com.google.gms.google-services'

    tasks.matching { task -> task.name == "processDebugGoogleServices" }.configureEach {
        enabled = false
    }
}

tasks.register("verifyTtcReleaseInputs") {
    group = "verification"
    description = "Fails closed when private TTC Android release inputs are unavailable."

    doLast {
        if (!hasTtcUploadSigning) {
            throw new GradleException("TTC Android release signing is not configured.")
        }

        def uploadStore = file(ttcUploadStoreFile)
        if (!uploadStore.isFile() || !uploadStore.canRead()) {
            throw new GradleException("TTC Android release signing file is unavailable.")
        }

        if (!hasTtcServicesConfig) {
            throw new GradleException("TTC Android release app configuration is unavailable.")
        }
    }
}

tasks.matching { task -> task.name == "preReleaseBuild" }.configureEach {
    dependsOn tasks.named("verifyTtcReleaseInputs")
}
